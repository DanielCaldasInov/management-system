services:
  mysql:
    image: mysql:8.0
    container_name: management_system_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: management_system
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - management_network

networks:
  management_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
